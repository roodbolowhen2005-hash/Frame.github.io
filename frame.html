// ── Helpers ───────────────────────────────────────────────────────────────────
const uid=()=>Math.random().toString(36).slice(2,9);
const LS="frame_v4";
const load=()=>{try{const r=localStorage.getItem(LS);return r?JSON.parse(r):null;}catch{return null;}};
const persist=d=>{try{localStorage.setItem(LS,JSON.stringify(d));}catch{}};
const t2m=t=>{if(!t)return 0;const[h,m]=t.split(":").map(Number);return h*60+m;};
const m2t=m=>{const h=Math.floor(m/60)%24,mn=m%60;return`${String(h).padStart(2,"0")}:${String(mn).padStart(2,"0")}`;};
function dayUsed(day,shots){
  return(day.shots||[]).reduce((a,e)=>{
    if(e.isBreak)return a+(e.duration||30);
    const s=shots.find(x=>x.id===e.shotId);
    return a+(s?(Number(s.setupTime)||0)+(Number(s.shootTime)||0):0);
  },0);
}

// ── Geocoding (city name → lat/lon) ──────────────────────────────────────────
async function geocode(city){
  if(!city)return null;
  try{
    const r=await fetch(`https://nominatim.openstreetmap.org/search?q=${encodeURIComponent(city)}&format=json&limit=1`,{headers:{"Accept-Language":"nl,en"}});
    const d=await r.json();
    if(!d||!d[0])return null;
    return{lat:parseFloat(d[0].lat),lon:parseFloat(d[0].lon),name:d[0].display_name.split(",").slice(0,2).join(", ")};
  }catch{return null;}
}

// ── Weather (Open-Meteo, no API key) ─────────────────────────────────────────
async function fetchWeather(date,lat,lon){
  if(!date||lat==null||lon==null)return null;
  try{
    const r=await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&daily=temperature_2m_max,temperature_2m_min,precipitation_sum,windspeed_10m_max,weathercode&timezone=auto&start_date=${date}&end_date=${date}`);
    const d=await r.json();
    if(!d.daily)return null;
    const codes={0:"Heldere lucht",1:"Overwegend helder",2:"Gedeeltelijk bewolkt",3:"Bewolkt",45:"Mist",51:"Lichte motregen",61:"Lichte regen",63:"Matige regen",71:"Lichte sneeuw",80:"Regenbuien",95:"Onweer"};
    return{desc:codes[d.daily.weathercode?.[0]]||`Code ${d.daily.weathercode?.[0]}`,max:Math.round(d.daily.temperature_2m_max?.[0]),min:Math.round(d.daily.temperature_2m_min?.[0]),wind:Math.round(d.daily.windspeed_10m_max?.[0]),precip:d.daily.precipitation_sum?.[0]};
  }catch{return null;}
}

// ── Sun times ─────────────────────────────────────────────────────────────────
function calcSun(dateStr,lat,lon){
  try{
    const d=new Date(dateStr);
    const n=Math.floor(d.getTime()/86400000)-Math.floor(new Date("2000-01-01").getTime()/86400000);
    const L=(280.46+0.9856474*n)%360;
    const g=((357.528+0.9856003*n)%360)*Math.PI/180;
    const lam=(L+1.915*Math.sin(g)+0.020*Math.sin(2*g))*Math.PI/180;
    const sinD=Math.sin(23.439*Math.PI/180)*Math.sin(lam);
    const cosD=Math.cos(Math.asin(sinD));
    const cosH=(Math.cos(90.833*Math.PI/180)-sinD*Math.sin(lat*Math.PI/180))/(cosD*Math.cos(lat*Math.PI/180));
    if(cosH>1||cosH<-1)return null;
    const H=Math.acos(cosH)*180/Math.PI;
    const GMST=(6.697375+0.0657098242*n)%24;
    const LMST=(GMST+lon/15)%24;
    const tr=(12-LMST+lon/15)%24;
    const fmt=v=>{const h=Math.floor(((v%24)+24)%24),m=Math.round((((v%24+24)%24)-h)*60);return`${String(h).padStart(2,"0")}:${String(m).padStart(2,"0")}`;};
    return{rise:fmt(tr-H/15),set:fmt(tr+H/15)};
  }catch{return null;}
}

function wIcon(w){
  if(!w)return"—";
  const d=(w.desc||"").toLowerCase();
  if(d.includes("helder")||d.includes("clear"))return"☀️";
  if(d.includes("bewolkt")||d.includes("cloud"))return"⛅";
  if(d.includes("regen")||d.includes("rain")||d.includes("motregen"))return"🌧";
  if(d.includes("sneeuw")||d.includes("snow"))return"❄️";
  if(d.includes("onweer")||d.includes("thunder"))return"⛈";
  if(d.includes("mist")||d.includes("fog"))return"🌫";
  return"🌡";
}

// ── Auto-planner ──────────────────────────────────────────────────────────────
function autoPlans(shots,day){
  const assign=arr=>{
    let cur=t2m(day.start||"08:00");
    return arr.map(s=>{const pt=m2t(cur);cur+=(Number(s.setupTime)||0)+(Number(s.shootTime)||0);return{id:uid(),shotId:s.id,plannedTime:pt,specialNotes:"",done:false};});
  };
  return[
    {label:"A",desc:"Locatie Efficiënt",shots:assign([...shots].sort((a,b)=>(a.location||"").localeCompare(b.location||"")))},
    {label:"B",desc:"Script Volgorde",shots:assign([...shots].sort((a,b)=>Number(a.scene)-Number(b.scene)||(a.shot||"").localeCompare(b.shot||"")))},
    {label:"C",desc:"Cast Geoptimaliseerd",shots:assign([...shots].sort((a,b)=>(a.cast||[]).join(",").localeCompare((b.cast||[]).join(","))))},
  ];
}

function slHTML(shots,name){
  const g={};shots.forEach(s=>{if(!g[s.scene])g[s.scene]=[];g[s.scene].push(s);});
  let rows="";
  Object.keys(g).sort((a,b)=>Number(a)-Number(b)).forEach(sc=>{
    rows+=`<tr><td colspan="9" class="sh" style="padding:5px 6px">SCENE ${sc}</td></tr>`;
    g[sc].forEach(s=>{rows+=`<tr><td><span class="tag">${s.scene}${s.shot}</span></td><td class="gold">${s.type}</td><td>${s.movement||""}</td><td>${s.location||"—"}</td><td class="mono" style="font-size:8px">${s.intExt} ${s.dayNight}</td><td style="max-width:160px">${s.description||""}</td><td>${(s.cast||[]).join(", ")}</td><td class="mono">${s.pages||""}</td><td class="mono">${(Number(s.setupTime)||0)+(Number(s.shootTime)||0)}m</td></tr>`;});
  });
  return`<h1>${name||"Production"} — Shot List</h1><table><thead><tr><th>Shot</th><th>Type</th><th>Beweging</th><th>Locatie</th><th>I/E</th><th>Beschrijving</th><th>Cast</th><th>Pagina's</th><th>Tijd</th></tr></thead><tbody>${rows}</tbody></table>`;
}

function schHTML(days,shots,name){
  let html=`<h1>${name||"Production"} — Draaischema</h1>`;
  days.forEach(day=>{
    const used=dayUsed(day,shots);const cap=t2m(day.end)-t2m(day.start);const over=used>cap;
    html+=`<h2>Dag ${day.dayNum} — ${day.date||"?"} &nbsp; ${day.start}–${day.end} &nbsp; <span class="${over?"ot":""}">${over?"⚠ ":""}${used}/${cap} min</span></h2>`;
    html+=`<table><thead><tr><th>Shot</th><th>Type</th><th>Locatie</th><th>D/N</th><th>Beschrijving</th><th>Cast</th><th>Pagina's</th><th>Geplande Tijd</th><th>Duur</th><th>Bijzonderheden</th></tr></thead><tbody>`;
    (day.shots||[]).forEach(e=>{
      if(e.isBreak){html+=`<tr><td colspan="10" class="brk" style="padding:5px 6px">⏸ ${e.label} (${e.duration||30}min)</td></tr>`;return;}
      const s=shots.find(x=>x.id===e.shotId);if(!s)return;
      html+=`<tr${e.done?' style="opacity:.4"':''}><td><span class="tag">${s.scene}${s.shot}</span></td><td class="gold">${s.type}</td><td>${s.location||""}</td><td class="mono" style="font-size:8px">${s.dayNight}</td><td>${s.description||""}</td><td>${(s.cast||[]).join(", ")}</td><td class="mono">${s.pages||""}</td><td class="mono">${e.plannedTime||"—"}</td><td class="mono">${(Number(s.setupTime)||0)+(Number(s.shootTime)||0)}m</td><td>${e.specialNotes||""}</td></tr>`;
    });
    html+="</tbody></table>";
  });
  return html;
}

function csHTML(day,shots,proj,wx,sun){
  if(!day)return"<p>Geen dag geselecteerd.</p>";
  const ds=(day.shots||[]).filter(e=>!e.isBreak).map(e=>({e,s:shots.find(x=>x.id===e.shotId)})).filter(x=>x.s);
  const g={};ds.forEach(({s})=>{if(!g[s.scene])g[s.scene]={s:[],l:new Set(),c:new Set()};g[s.scene].s.push(s);(s.cast||[]).forEach(c=>g[s.scene].c.add(c));g[s.scene].l.add(s.location);});
  const scRows=Object.keys(g).sort((a,b)=>Number(a)-Number(b)).map(sc=>{const gg=g[sc];return`<tr><td class="gold">${sc}</td><td>${[...gg.l].join(", ")}</td><td>${[...gg.c].join(", ")}</td><td class="mono" style="font-size:8px">NIGHT</td><td class="mono">${gg.s[0]?.pages||""}</td><td style="color:#888">${gg.s.map(s=>s.notes).filter(Boolean).join("; ")}</td></tr>`;}).join("");
  const castRows=(proj.cast||[]).map((c,i)=>`<tr><td class="mono">${i+1}</td><td>${c.name}</td><td>${c.character}</td><td class="gold">${c.callTime||day.start}</td><td>${c.phone||""}</td><td>${c.email||""}</td></tr>`).join("");
  const crewRows=(proj.crew||[]).map(c=>`<tr><td class="mono" style="color:#999">${c.position}</td><td>${c.name}</td><td class="gold">${c.callTime||day.start}</td><td>${c.phone||""}</td><td>${c.email||""}</td></tr>`).join("");
  const wxBlock=wx?`<div style="font-size:14px">${wIcon(wx)} ${wx.desc}</div><div style="color:#999;font-size:11px;margin-top:2px">${wx.max}°/${wx.min}°C &nbsp; Wind ${wx.wind}km/h &nbsp; Neerslag ${wx.precip}mm</div>`:`<div style="color:#ccc;font-size:10px">Geen weerdata</div>`;
  const sunBlock=sun?`<div style="margin-top:6px"><span class="lbl">Zonsopgang / Zonsondergang</span>↑ ${sun.rise} &nbsp;&nbsp; ↓ ${sun.set}</div>`:"";
  const locBlock=proj.cityName?`<div style="margin-top:6px"><span class="lbl">Locatie</span>${proj.cityName}</div>`:"";
  return`
  <div class="cs-head">
    <div><span class="lbl">Productie</span><div style="font-size:20px;font-weight:300;letter-spacing:1px">${proj.name||"Untitled"}</div>${proj.director?`<div style="color:#888;margin-top:3px;font-size:12px">Regie: ${proj.director}</div>`:""}${proj.producer?`<div style="color:#999;font-size:11px">Prod: ${proj.producer}</div>`:""}</div>
    <div style="text-align:center"><span class="lbl">Call Time</span><div class="call">${day.start}</div><div class="mono" style="font-size:9px;color:#999">DAG ${day.dayNum} — ${day.date||"?"}</div></div>

function PhotoUp({value,onChange}){
  const ref=useRef();
  const h=e=>{const f=e.target.files[0];if(!f)return;const r=new FileReader();r.onload=ev=>onChange(ev.target.result);r.readAsDataURL(f);};

    <div style={{position:"relative",display:"inline-block"}}>

//  SCHEDULE
// ═════════════════════════════════════════════════════════════════════════════
function ScheduleTab({t,data,upDays}){
  const [expDay,setExpDay]=useState(null);
  const [addTo,setAddTo]=useState(null);
  const [selShot,setSelShot]=useState("");
  const [ptm,setPtm]=useState("");
  const [sn,setSn]=useState("");
  const [dragI,setDragI]=useState(null);
  const [dragO,setDragO]=useState(null);
  const [mode,setMode]=useState({});
  const [plans,setPlans]=useState({});
  const [selPlan,setSelPlan]=useState({});
  const days=data.days||[];
  const shots=data.shots||[];
  const addDay=()=>{const d={id:uid(),dayNum:days.length+1,date:"",start:"16:00",end:"22:00",shots:[]};upDays([...days,d]);setExpDay(d.id);};
  const updDay=(id,p)=>upDays(days.map(d=>d.id===id?{...d,...p}:d));
  const delDay=id=>upDays(days.filter(d=>d.id!==id));
  const addShot=dayId=>{
    const s=shots.find(s=>s.id===selShot);if(!s)return;
    upDays(days.map(d=>d.id===dayId?{...d,shots:[...d.shots,{id:uid(),shotId:selShot,plannedTime:ptm,specialNotes:sn,done:false}]}:d));
    setAddTo(null);setSelShot("");setPtm("");setSn("");
  };
  const addBreak=(dayId,label,dur)=>upDays(days.map(d=>d.id===dayId?{...d,shots:[...d.shots,{id:uid(),isBreak:true,label,duration:dur,done:false}]}:d));
  const togDone=(dayId,eid)=>upDays(days.map(d=>d.id===dayId?{...d,shots:d.shots.map(s=>s.id===eid?{...s,done:!s.done}:s)}:d));
  const remE=(dayId,eid)=>upDays(days.map(d=>d.id===dayId?{...d,shots:d.shots.filter(s=>s.id!==eid)}:d));
  const onDS=(dayId,idx)=>setDragI({dayId,idx});
  const onDrop=(dayId,idx)=>{
    if(!dragI||dragI.dayId!==dayId)return;
    const day=days.find(d=>d.id===dayId);if(!day)return;
    const arr=[...day.shots];const[m]=arr.splice(dragI.idx,1);arr.splice(idx,0,m);
    upDays(days.map(d=>d.id===dayId?{...d,shots:arr}:d));setDragI(null);setDragO(null);
  };
  const genPlans=dayId=>{const day=days.find(d=>d.id===dayId);setPlans(x=>({...x,[dayId]:autoPlans(shots,day)}));setSelPlan(x=>({...x,[dayId]:0}));};
  const applyPlan=dayId=>{const p=plans[dayId];const i=selPlan[dayId]||0;if(!p||!p[i])return;upDays(days.map(d=>d.id===dayId?{...d,shots:p[i].shots}:d));setMode(m=>({...m,[dayId]:"manual"}));};
  return(
    <div>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}>
        <h1 style={{fontSize:20,fontWeight:300,letterSpacing:2}}>{t.sch.title}</h1>
        <button className="btn bg" onClick={addDay}>+ {t.sch.addDay}</button>
      </div>
      {days.length===0&&<div style={{textAlign:"center",padding:55,color:"#2a2a2a"}} className="mono">📅 {t.sch.empty}</div>}
      {days.map(day=>{
        const used=dayUsed(day,shots);const cap=t2m(day.end)-t2m(day.start);const over=cap>0&&used>cap;
        const isExp=expDay===day.id;const done=day.shots.filter(s=>s.done).length;const total=day.shots.filter(s=>!s.isBreak).length;
        const m=mode[day.id]||"manual";
        return(
          <div key={day.id} className="card" style={{marginBottom:8}}>
            <div onClick={()=>setExpDay(isExp?null:day.id)} style={{display:"flex",justifyContent:"space-between",alignItems:"center",cursor:"pointer"}}>
              <div style={{display:"flex",alignItems:"center",gap:9}}>
                <span className="mono" style={{fontSize:9,color:"#b8860b",letterSpacing:2}}>DAG {day.dayNum}</span>
                <span style={{fontSize:12,color:"#666"}}>{day.date||"—"}</span>
                <span className="mono" style={{fontSize:9,color:"#333"}}>{day.start}–{day.end}</span>
                {over&&<span className="ot">⚠ {t.sch.ot} +{used-cap}min</span>}
              </div>
              <div style={{display:"flex",alignItems:"center",gap:8}}>
                <span className="mono" style={{fontSize:8,color:over?"#e05050":"#333"}}>{used}/{cap}m</span>
                <div style={{width:42,height:3,background:"#1a1a1a",borderRadius:2}}><div style={{width:`${Math.min(100,(used/Math.max(cap,1))*100)}%`,height:"100%",background:over?"#9a0000":"#b8860b",borderRadius:2,transition:"width .3s"}}/></div>
                <span style={{color:"#2a2a2a",fontSize:11}}>{isExp?"▲":"▼"}</span>
              </div>
            </div>
            {isExp&&(
              <div style={{marginTop:13}}>
                <div className="grid3" style={{marginBottom:11}}>
                  <div className="fld"><label>{t.sch.date}</label><input type="date" value={day.date} onChange={e=>updDay(day.id,{date:e.target.value})}/></div>
                  <div className="fld"><label>{t.sch.start}</label><input type="time" value={day.start} onChange={e=>updDay(day.id,{start:e.target.value})}/></div>
                  <div className="fld"><label>{t.sch.end}</label><input type="time" value={day.end} onChange={e=>updDay(day.id,{end:e.target.value})}/></div>
                </div>
                <div style={{display:"flex",gap:5,marginBottom:11,flexWrap:"wrap"}}>
                  <button className="btn sm" onClick={()=>setMode(x=>({...x,[day.id]:"manual"}))} style={{background:m==="manual"?"#b8860b":"#1a1a1a",color:m==="manual"?"#000":"#555",border:"1px solid #222"}}>✋ {t.sch.manual}</button>
                  <button className="btn sm" onClick={()=>{setMode(x=>({...x,[day.id]:"auto"}));genPlans(day.id);}} style={{background:m==="auto"?"#b8860b":"#1a1a1a",color:m==="auto"?"#000":"#555",border:"1px solid #222"}}>⚡ {t.sch.auto}</button>
                  <div style={{flex:1}}/>
                  <button className="btn gh sm" onClick={()=>printWin(schHTML([day],shots,data.project?.name),"Draaischema")}>⬇ PDF</button>
                </div>
                {m==="auto"&&plans[day.id]&&(
                  <div style={{background:"#0c0c0c",border:"1px solid #222",borderRadius:3,padding:11,marginBottom:11}}>
                    <SLbl>⚡ AUTO-GEGENEREERDE PLANNEN</SLbl>
                    <div style={{display:"flex",gap:5,marginBottom:9,flexWrap:"wrap"}}>
                      {plans[day.id].map((pl,i)=><button key={i} className="btn sm" onClick={()=>setSelPlan(x=>({...x,[day.id]:i}))} style={{background:selPlan[day.id]===i?"#b8860b":"#181818",color:selPlan[day.id]===i?"#000":"#666",border:"1px solid #222"}}>Plan {pl.label} — {pl.desc}</button>)}
                    </div>
                    {plans[day.id][selPlan[day.id]||0]?.shots.map((e,i)=>{const s=shots.find(x=>x.id===e.shotId);if(!s)return null;return(
                      <div key={i} style={{display:"flex",gap:7,padding:"5px 0",borderBottom:"1px solid #1a1a1a",fontSize:11,alignItems:"center"}}>
                        <span className="tag">{s.scene}{s.shot}</span>
                        <span className="mono" style={{fontSize:8,color:"#b8860b"}}>{s.type}</span>
                        <span style={{color:"#666"}}>{s.location}</span>
                        <span style={{color:"#555",flex:1}}>{s.description?.slice(0,32)}</span>
                        <span className="mono" style={{fontSize:8,color:"#555"}}>{e.plannedTime}</span>
                        <span className="mono" style={{fontSize:8,color:"#333"}}>{(Number(s.setupTime)+Number(s.shootTime))}m</span>
                      </div>
                    );})}
                    <button className="btn bg sm" style={{marginTop:9}} onClick={()=>applyPlan(day.id)}>✓ {t.sch.apply}</button>
                  </div>
                )}
                {m==="manual"&&(
                  <>
                    <div className="mono" style={{fontSize:8,color:"#2a2a2a",marginBottom:5,letterSpacing:1}}>⠿ {t.sch.drag}</div>
                    {day.shots.map((entry,idx)=>{
                      if(entry.isBreak)return(
                        <div key={entry.id} style={{background:"#0b0b0b",border:"1px dashed #1e1e1e",borderRadius:2,padding:"7px 10px",marginBottom:3,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                          <span className="mono" style={{fontSize:9,color:"#3a3a3a"}}>⏸ {entry.label} ({entry.duration}min)</span>
                          <button className="btn rd sm" onClick={()=>remE(day.id,entry.id)}>✕</button>
                        </div>
                      );
                      const s=shots.find(x=>x.id===entry.shotId);
                      return(
                        <div key={entry.id} draggable
                          onDragStart={()=>onDS(day.id,idx)}
                          onDragOver={e=>{e.preventDefault();setDragO(`${day.id}-${idx}`);}}
                          onDrop={()=>onDrop(day.id,idx)}
                          onDragLeave={()=>setDragO(null)}
                          className={dragO===`${day.id}-${idx}`?"do":""}
                          style={{background:entry.done?"#090909":"#0f0f0f",border:"1px solid #1a1a1a",borderRadius:2,padding:"8px 10px",marginBottom:3,display:"grid",gridTemplateColumns:"13px 48px 62px 1fr 63px 52px auto",gap:6,alignItems:"center",cursor:"grab",fontSize:11}}>
                          <span style={{color:"#1e1e1e",userSelect:"none"}}>⠿</span>
                          <span className="tag" style={{opacity:entry.done?.4:1}}>{s?.scene}{s?.shot}</span>
                          <span className="mono" style={{fontSize:8,color:"#b8860b"}}>{s?.type}</span>
                          <span style={{color:entry.done?"#2a2a2a":"#888"}}>{s?.description}</span>
                          <span className="mono" style={{fontSize:8,color:"#3a3a3a"}}>{entry.plannedTime||"—"}</span>
                          <span className="mono" style={{fontSize:8,color:"#333"}}>{s?(Number(s.setupTime)+Number(s.shootTime)):0}m</span>
                          <div style={{display:"flex",gap:3}}>
                            <button className="btn sm" onClick={()=>togDone(day.id,entry.id)} style={{background:entry.done?"#b8860b":"#181818",color:entry.done?"#000":"#444",border:"1px solid #1e1e1e",padding:"3px 7px"}}>{entry.done?"✓":"○"}</button>
                            <button className="btn rd sm" onClick={()=>remE(day.id,entry.id)}>✕</button>
                          </div>
                        </div>
                      );
                    })}
                    {addTo===day.id?(
                      <div style={{background:"#0c0c0c",border:"1px solid #1e1e1e",borderRadius:2,padding:10,marginTop:6}}>
                        <div className="grid3" style={{marginBottom:7}}>
                          <div className="fld"><label>{t.sch.selShot}</label><select value={selShot} onChange={e=>setSelShot(e.target.value)}><option value="">—</option>{shots.map(s=><option key={s.id} value={s.id}>{s.scene}{s.shot} — {s.description?.slice(0,22)}</option>)}</select></div>
                          <div className="fld"><label>{t.sch.planned}</label><input type="time" value={ptm} onChange={e=>setPtm(e.target.value)}/></div>
                          <div className="fld"><label>{t.sch.special}</label><input value={sn} onChange={e=>setSn(e.target.value)}/></div>
                        </div>
                        <div style={{display:"flex",gap:5}}>
                          <button className="btn bg sm" onClick={()=>addShot(day.id)}>+ {t.sch.add}</button>
                          <button className="btn gh sm" onClick={()=>setAddTo(null)}>{t.sch.cancel}</button>
                        </div>
                      </div>
                    ):(
                      <div style={{display:"flex",gap:5,marginTop:7,flexWrap:"wrap"}}>
                        <button className="btn gh sm" onClick={()=>setAddTo(day.id)}>+ {t.sch.addShot}</button>
                        <button className="btn gh sm" onClick={()=>addBreak(day.id,t.sch.dinner,45)}>⏸ {t.sch.dinner}</button>
                        <button className="btn gh sm" onClick={()=>addBreak(day.id,t.sch.addBreak,30)}>⏸ {t.sch.addBreak}</button>
                        <div style={{flex:1}}/>
                        <button className="btn rd sm" onClick={()=>delDay(day.id)}>✕ {t.sch.del}</button>
                      </div>
                    )}
                  </>
                )}
              </div>
            )}
          </div>
        );
      })}
    </div>
  );
}

// ═════════════════════════════════════════════════════════════════════════════
//  CALLSHEET
// ═════════════════════════════════════════════════════════════════════════════
function CallsheetTab({t,data}){
  const [selId,setSelId]=useState(data.days?.[0]?.id||"");
  const [wx,setWx]=useState(null);
  const [loadWx,setLoadWx]=useState(false);
  const [sun,setSun]=useState(null);
  const days=data.days||[],shots=data.shots||[],proj=data.project||{};
  const day=days.find(d=>d.id===selId);
  useEffect(()=>{
    if(!day?.date||proj.cityLat==null||proj.cityLon==null){setWx(null);setSun(null);return;}
    setLoadWx(true);
    fetchWeather(day.date,proj.cityLat,proj.cityLon).then(w=>{setWx(w);setLoadWx(false);});
    setSun(calcSun(day.date,Number(proj.cityLat),Number(proj.cityLon)));
  },[selId,day?.date,proj.cityLat,proj.cityLon]);
  const ds=(day?.shots||[]).filter(e=>!e.isBreak).map(e=>({e,s:shots.find(x=>x.id===e.shotId)})).filter(x=>x.s);
  const grp={};ds.forEach(({s})=>{if(!grp[s.scene])grp[s.scene]={s:[],l:new Set(),c:new Set()};grp[s.scene].s.push(s);(s.cast||[]).forEach(c=>grp[s.scene].c.add(c));grp[s.scene].l.add(s.location);});
  return(
    <div>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}>
        <h1 style={{fontSize:20,fontWeight:300,letterSpacing:2}}>{t.cs.title}</h1>
        <div style={{display:"flex",gap:6}}>
          <select value={selId} onChange={e=>setSelId(e.target.value)} style={{background:"#141414",border:"1px solid #222",color:"#e8e0d0",padding:"5px 10px",borderRadius:2,fontFamily:"inherit",fontSize:12,outline:"none"}}>
            <option value="">— {t.cs.selDay} —</option>
            {days.map(d=><option key={d.id} value={d.id}>Dag {d.dayNum} — {d.date||"?"}</option>)}
          </select>
          {day&&<button className="btn bg sm" onClick={()=>printWin(csHTML(day,shots,proj,wx,sun),t.cs.title)}>⬇ {t.cs.dl}</button>}
        </div>
      </div>
      {!day&&<div style={{textAlign:"center",padding:55,color:"#2a2a2a"}} className="mono">{t.cs.noDay}</div>}
      {day&&(
        <div style={{background:"#0c0c0c",border:"1px solid #1a1a1a",borderRadius:3,overflow:"hidden"}}>
          <div style={{background:"#060606",borderBottom:"1px solid #181818",padding:"16px 20px",display:"grid",gridTemplateColumns:"1fr auto 1fr",gap:16,alignItems:"center"}}>
            <div>
              <span className="mono" style={{fontSize:7,color:"#2a2a2a",letterSpacing:3,display:"block"}}>PRODUCTIE</span>
              <div style={{fontSize:19,fontWeight:300,letterSpacing:1,marginTop:2}}>{proj.name||"Untitled"}</div>
              {proj.director&&<div style={{fontSize:11,color:"#666",marginTop:3}}>Regie: {proj.director}</div>}
              {proj.producer&&<div style={{fontSize:11,color:"#555"}}>Prod: {proj.producer}</div>}
              {proj.cityName&&<div style={{fontSize:10,color:"#444",marginTop:3}}>📍 {proj.cityName}</div>}
            </div>
            <div style={{textAlign:"center"}}>
              <span className="mono" style={{fontSize:7,color:"#2a2a2a",letterSpacing:3,display:"block"}}>CALL TIME</span>
              <div className="mono" style={{fontSize:36,color:"#b8860b",letterSpacing:2}}>{day.start}</div>
              <div className="mono" style={{fontSize:9,color:"#3a3a3a"}}>DAG {day.dayNum} — {day.date||"?"}</div>
            </div>
            <div style={{textAlign:"right"}}>
              <span className="mono" style={{fontSize:7,color:"#2a2a2a",letterSpacing:3,display:"block",marginBottom:5}}>{t.cs.weather.toUpperCase()}</span>
              {loadWx&&<div style={{fontSize:11,color:"#444"}}>{t.cs.fetching}</div>}
              {!loadWx&&!wx&&<div style={{fontSize:10,color:"#2a2a2a",lineHeight:1.5}}>{t.cs.noWeather}</div>}
              {wx&&<div><div style={{fontSize:15}}>{wIcon(wx)} {wx.desc}</div><div style={{fontSize:11,color:"#777"}}>{wx.max}°/{wx.min}°C · {t.cs.wind} {wx.wind}km/h · {wx.precip}mm</div></div>}
              {sun&&<div style={{marginTop:5}}><span className="mono" style={{fontSize:7,color:"#2a2a2a",letterSpacing:2,display:"block"}}>{t.cs.sunrise.toUpperCase()} / {t.cs.sunset.toUpperCase()}</span><span style={{fontSize:11,color:"#888"}}>↑ {sun.rise} &nbsp; ↓ {sun.set}</span></div>}
              {proj.hospital&&<div style={{marginTop:5}}><span className="mono" style={{fontSize:7,color:"#2a2a2a",letterSpacing:2,display:"block"}}>{t.cs.hospital.toUpperCase()}</span><span style={{fontSize:10,color:"#888"}}>{proj.hospital}</span></div>}
              {proj.transport&&<div style={{marginTop:4}}><span className="mono" style={{fontSize:7,color:"#2a2a2a",letterSpacing:2,display:"block"}}>{t.cs.transport.toUpperCase()}</span><span style={{fontSize:10,color:"#666"}}>{proj.transport}</span></div>}
            </div>
          </div>
          <CSec label="SCENES">
            <table style={{width:"100%",borderCollapse:"collapse",fontSize:11}}>
              <thead><tr>{["Scene","Set","Cast","D/N","Pagina's","Bijzonderheden"].map(h=><th key={h} style={{fontFamily:"'Share Tech Mono',monospace",fontSize:7,color:"#2a2a2a",padding:"4px 6px",textAlign:"left",fontWeight:"normal",borderBottom:"1px solid #191919",letterSpacing:1}}>{h}</th>)}</tr></thead>
              <tbody>{Object.keys(grp).sort((a,b)=>Number(a)-Number(b)).map(sc=>{const gg=grp[sc];return<tr key={sc} style={{borderBottom:"1px solid #111"}}><td style={{padding:"6px 6px",color:"#b8860b"}} className="mono">{sc}</td><td style={{padding:"6px 6px",color:"#ccc"}}>{[...gg.l].join(", ")}</td><td style={{padding:"6px 6px",color:"#888"}}>{[...gg.c].join(", ")}</td><td className="mono" style={{padding:"6px 6px",color:"#444",fontSize:8}}>NIGHT</td><td className="mono" style={{padding:"6px 6px",color:"#444",fontSize:8}}>{gg.s[0]?.pages}</td><td style={{padding:"6px 6px",color:"#3a3a3a",fontSize:10}}>{gg.s.map(s=>s.notes).filter(Boolean).join("; ")}</td></tr>;})}</tbody>
            </table>
          </CSec>
          {proj.cast?.length>0&&<CSec label={t.cs.cast}><table style={{width:"100%",borderCollapse:"collapse",fontSize:11}}><thead><tr>{["#","Acteur","Karakter","Call Time","Telefoon","E-mail"].map(h=><th key={h} style={{fontFamily:"'Share Tech Mono',monospace",fontSize:7,color:"#2a2a2a",padding:"4px 6px",textAlign:"left",fontWeight:"normal",borderBottom:"1px solid #191919"}}>{h}</th>)}</tr></thead><tbody>{proj.cast.map((c,i)=><tr key={i} style={{borderBottom:"1px solid #111"}}><td className="mono" style={{padding:"6px 6px",color:"#3a3a3a",fontSize:8}}>{i+1}</td><td style={{padding:"6px 6px",color:"#ddd"}}>{c.name}</td><td style={{padding:"6px 6px",color:"#999"}}>{c.character}</td><td className="mono" style={{padding:"6px 6px",color:"#b8860b",fontSize:10}}>{c.callTime||day.start}</td><td style={{padding:"6px 6px",color:"#555",fontSize:10}}>{c.phone}</td><td style={{padding:"6px 6px",color:"#555",fontSize:10}}>{c.email}</td></tr>)}</tbody></table></CSec>}
          {proj.crew?.length>0&&<CSec label={t.cs.crew}><table style={{width:"100%",borderCollapse:"collapse",fontSize:11}}><tbody>{proj.crew.map((c,i)=><tr key={i} style={{borderBottom:"1px solid #111"}}><td className="mono" style={{padding:"6px 6px",color:"#3a3a3a",fontSize:8,width:"24%"}}>{c.position}</td><td style={{padding:"6px 6px",color:"#ddd"}}>{c.name}</td><td className="mono" style={{padding:"6px 6px",color:"#b8860b",fontSize:10}}>{c.callTime||day.start}</td><td style={{padding:"6px 6px",color:"#555",fontSize:10}}>{c.phone}</td><td style={{padding:"6px 6px",color:"#555",fontSize:10}}>{c.email}</td></tr>)}</tbody></table></CSec>}
          {proj.notes&&<CSec label={t.cs.notes}><p style={{fontSize:12,color:"#777",lineHeight:1.7}}>{proj.notes}</p></CSec>}
        </div>
      )}
    </div>
  );
}
function CSec({label,children}){return<div style={{padding:"14px 20px",borderBottom:"1px solid #121212"}}><span className="mono" style={{fontSize:8,color:"#b8860b",letterSpacing:3,display:"block",marginBottom:8}}>{label}</span>{children}</div>;}

// ═════════════════════════════════════════════════════════════════════════════
//  PROJECT
// ═════════════════════════════════════════════════════════════════════════════
function ProjectTab({t,data,upProj}){
  const [proj,setProj]=useState(data.project||{});
  const [saved,setSaved]=useState(false);
  const [cityInput,setCityInput]=useState(data.project?.city||"");
  const [cityStatus,setCityStatus]=useState(null); // null | "searching" | "found" | "notfound"
  const [nc,setNc]=useState({name:"",character:"",phone:"",email:"",callTime:""});
  const [nw,setNw]=useState({position:"",name:"",phone:"",email:"",callTime:""});
  const save=()=>{upProj(proj);setSaved(true);setTimeout(()=>setSaved(false),2000);};
  const addC=()=>{if(!nc.name)return;setProj(p=>({...p,cast:[...(p.cast||[]),{...nc,id:uid()}]}));setNc({name:"",character:"",phone:"",email:"",callTime:""});};
  const remC=id=>setProj(p=>({...p,cast:p.cast.filter(c=>c.id!==id)}));
  const addW=()=>{if(!nw.name)return;setProj(p=>({...p,crew:[...(p.crew||[]),{...nw,id:uid()}]}));setNw({position:"",name:"",phone:"",email:"",callTime:""});};
  const remW=id=>setProj(p=>({...p,crew:p.crew.filter(c=>c.id!==id)}));
  const F=({l,f,type="text",ph=""})=><div className="fld"><label>{l}</label><input type={type} value={proj[f]||""} onChange={e=>setProj(p=>({...p,[f]:e.target.value}))} placeholder={ph}/></div>;
  const searchCity=async()=>{
    if(!cityInput.trim())return;
    setCityStatus("searching");
    const result=await geocode(cityInput.trim());
    if(result){
      setProj(p=>({...p,city:cityInput,cityLat:result.lat,cityLon:result.lon,cityName:result.name}));
      setCityStatus("found");
    } else {
      setCityStatus("notfound");
    }
  };
  return(
    <div>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}>
        <h1 style={{fontSize:20,fontWeight:300,letterSpacing:2}}>{t.proj.title}</h1>
        <button className="btn bg" onClick={save}>{saved?`✓ ${t.proj.saved}`:t.proj.save}</button>
      </div>
      <div className="grid2">
        <div>
          <SLbl>PRODUCTIE INFO</SLbl>
          <div style={{display:"flex",flexDirection:"column",gap:9}}>
            <F l={t.proj.name} f="name"/>
            <F l={t.proj.director} f="director"/>
            <F l={t.proj.producer} f="producer"/>
            <F l={t.proj.dop} f="dop"/>
            <F l={t.proj.ad} f="ad"/>
            <F l={t.proj.sound} f="sound"/>
            <F l={t.proj.hospital} f="hospital"/>
            <F l={t.proj.transport} f="transport"/>
          </div>
          <SLbl mt={16}>📍 LOCATIE & WEER</SLbl>
          <div style={{fontSize:10,color:"#3a3a3a",marginBottom:9,lineHeight:1.6}}>{t.proj.cityNote}</div>
          <div style={{display:"flex",gap:7,alignItems:"flex-end"}}>
            <div className="fld" style={{flex:1}}><label>{t.proj.city}</label><input value={cityInput} onChange={e=>setCityInput(e.target.value)} onKeyDown={e=>e.key==="Enter"&&searchCity()} placeholder="bijv. Leiden"/></div>
            <button className="btn bg sm" onClick={searchCity} style={{marginBottom:1,flexShrink:0}}>{cityStatus==="searching"?"…":t.proj.citySearch}</button>
          </div>
          {cityStatus==="found"&&<div style={{fontSize:10,color:"#6a9a5a",marginTop:5,fontFamily:"'Share Tech Mono',monospace"}}>✓ {proj.cityName}</div>}
          {cityStatus==="notfound"&&<div style={{fontSize:10,color:"#e05050",marginTop:5,fontFamily:"'Share Tech Mono',monospace"}}>✗ {t.proj.cityNotFound}</div>}
          <div className="fld" style={{marginTop:9}}><label>{t.proj.notes}</label><textarea rows={4} value={proj.notes||""} onChange={e=>setProj(p=>({...p,notes:e.target.value}))} style={{resize:"vertical",background:"#141414",border:"1px solid #222",color:"#e8e0d0",padding:"7px 10px",borderRadius:2,fontSize:13,outline:"none"}}/></div>
        </div>
        <div>
          <SLbl>CAST</SLbl>
          {(proj.cast||[]).map(c=>(
            <div key={c.id} style={{background:"#0f0f0f",border:"1px solid #1a1a1a",borderRadius:2,padding:"7px 10px",marginBottom:4,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
              <div style={{fontSize:12}}><span style={{color:"#e8e0d0"}}>{c.name}</span><span style={{color:"#b8860b",marginLeft:7,fontFamily:"'Share Tech Mono',monospace",fontSize:9}}>{c.character}</span>{c.phone&&<span style={{color:"#444",marginLeft:7,fontSize:10}}>{c.phone}</span>}</div>
              <button className="btn rd sm" onClick={()=>remC(c.id)}>✕</button>
            </div>
          ))}
          <div style={{background:"#0a0a0a",border:"1px dashed #1e1e1e",borderRadius:2,padding:10,marginTop:4}}>
            <div className="grid2" style={{marginBottom:7}}>
              <div className="fld"><label>{t.proj.castName}</label><input value={nc.name} onChange={e=>setNc(v=>({...v,name:e.target.value}))}/></div>
              <div className="fld"><label>{t.proj.char}</label><input value={nc.character} onChange={e=>setNc(v=>({...v,character:e.target.value}))}/></div>
              <div className="fld"><label>{t.proj.phone}</label><input value={nc.phone} onChange={e=>setNc(v=>({...v,phone:e.target.value}))}/></div>
              <div className="fld"><label>{t.proj.email}</label><input value={nc.email} onChange={e=>setNc(v=>({...v,email:e.target.value}))}/></div>
              <div className="fld"><label>{t.proj.callTime}</label><input type="time" value={nc.callTime} onChange={e=>setNc(v=>({...v,callTime:e.target.value}))}/></div>
            </div>
            <button className="btn gh sm" onClick={addC}>+ {t.proj.addCast}</button>
          </div>
          <SLbl mt={16}>CREW</SLbl>
          {(proj.crew||[]).map(c=>(
            <div key={c.id} style={{background:"#0f0f0f",border:"1px solid #1a1a1a",borderRadius:2,padding:"7px 10px",marginBottom:4,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
              <div style={{fontSize:12}}><span className="mono" style={{color:"#3a3a3a",fontSize:9}}>{c.position}</span><span style={{color:"#e8e0d0",marginLeft:8}}>{c.name}</span>{c.phone&&<span style={{color:"#444",marginLeft:7,fontSize:10}}>{c.phone}</span>}</div>
              <button className="btn rd sm" onClick={()=>remW(c.id)}>✕</button>
            </div>
          ))}
          <div style={{background:"#0a0a0a",border:"1px dashed #1e1e1e",borderRadius:2,padding:10,marginTop:4}}>
            <div className="grid2" style={{marginBottom:7}}>
              <div className="fld"><label>{t.proj.pos}</label><input value={nw.position} onChange={e=>setNw(v=>({...v,position:e.target.value}))} placeholder="Dir. of Photography"/></div>
              <div className="fld"><label>Naam</label><input value={nw.name} onChange={e=>setNw(v=>({...v,name:e.target.value}))}/></div>
              <div className="fld"><label>{t.proj.phone}</label><input value={nw.phone} onChange={e=>setNw(v=>({...v,phone:e.target.value}))}/></div>
              <div className="fld"><label>{t.proj.email}</label><input value={nw.email} onChange={e=>setNw(v=>({...v,email:e.target.value}))}/></div>
              <div className="fld"><label>{t.proj.callTime}</label><input type="time" value={nw.callTime} onChange={e=>setNw(v=>({...v,callTime:e.target.value}))}/></div>
            </div>
            <button className="btn gh sm" onClick={addW}>+ {t.proj.addCrew}</button>
          </div>
        </div>
      </div>
    </div>
  );
}

// ═════════════════════════════════════════════════════════════════════════════
//  SYNC & EXPORT
// ═════════════════════════════════════════════════════════════════════════════
function SyncTab({t,data,setData}){
  const [copied,setCopied]=useState(false);
  const [drag,setDrag]=useState(false);
  const ref=useRef();
  const shots=data.shots||[];const days=data.days||[];const proj=data.project||{};
  const expJSON=()=>{

  };
  const expURL=()=>{
    try{
      const stripped={...data,shots:shots.map(s=>({...s,photo:""}))};

  return(
    <div>
      <h1 style={{fontSize:20,fontWeight:300,letterSpacing:2,marginBottom:16}}>☁ {t.sync.title}</h1>
      <div className="grid2">
        <div className="card">
          <SLbl>💾 PROJECT DATA</SLbl>

            <button className="btn bg" onClick={expJSON} style={{width:"100%"}}>⬇ {t.sync.expJson}</button>
            <div onDragOver={e=>{e.preventDefault();setDrag(true);}} onDragLeave={()=>setDrag(false)}
              onDrop={e=>{e.preventDefault();setDrag(false);impJSON(e.dataTransfer.files[0]);}}
              onClick={()=>ref.current?.click()}
              style={{border:`1px dashed ${drag?"#b8860b":"#222"}`,borderRadius:2,padding:"16px 12px",textAlign:"center",cursor:"pointer",background:drag?"#b8860b09":"transparent",transition:"all .2s"}}>
              <div style={{fontSize:20,marginBottom:4}}>📂</div>
              <div className="mono" style={{fontSize:9,color:"#3a3a3a",letterSpacing:1}}>{t.sync.drop}</div>
            </div>
            <input ref={ref} type="file" accept=".json" onChange={e=>impJSON(e.target.files[0])} style={{display:"none"}}/>
          </div>
          <div style={{marginTop:9,fontSize:10,color:"#2a2a2a",lineHeight:1.6}}>Exporteer als JSON en deel met teamleden, of importeer op een ander apparaat.</div>

        <div className="card">

          <div style={{fontSize:10,color:"#2a2a2a",lineHeight:1.7}}>Je project wordt gecodeerd in een deelbare URL. Iedereen met de link opent direct jouw planning.<br/><br/><span style={{color:"#222"}}>⚠ Foto's worden niet meegenomen (te groot voor URL). Gebruik JSON export daarvoor.</span></div>

const DRAW_COLORS=["#e8e0d0","#b8860b","#e05050","#5090e0","#50c060","#c050c0","#f0a030","#50d0d0","#ffffff","#000000"];

function StoryboardTab({t,data,upStoryboard}){
  const cards=data.storyboard||[];
  const shots=data.shots||[];
  const [view,setView]=useState("horizontal"); // horizontal | grid
  const [editing,setEditing]=useState(null);
  const [drawing,setDrawing]=useState(null); // card id being drawn on

  const addCard=()=>{
    const c={id:uid(),label:"",shotId:"",media:[],canvas:"",description:"",framing:"",lighting:"",audio:"",order:cards.length};
    upStoryboard([...cards,c]);
    setEditing(c.id);
  };
  const updateCard=(id,patch)=>upStoryboard(cards.map(c=>c.id===id?{...c,...patch}:c));
  const deleteCard=id=>upStoryboard(cards.filter(c=>c.id!==id));
  const moveCard=(id,dir)=>{
    const arr=[...cards];
    const i=arr.findIndex(c=>c.id===id);
    if(dir===-1&&i===0)return;
    if(dir===1&&i===arr.length-1)return;
    const tmp=arr[i+dir];arr[i+dir]=arr[i];arr[i]=tmp;
    upStoryboard(arr);
  };

  return(
    <div>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16,gap:8}}>
        <h1 style={{fontSize:20,fontWeight:300,letterSpacing:2}}>🎨 Storyboard</h1>
        <div style={{display:"flex",gap:6,alignItems:"center"}}>
          <button className="btn sm" onClick={()=>setView("horizontal")} style={{background:view==="horizontal"?"#b8860b":"transparent",color:view==="horizontal"?"#000":"#555",border:"1px solid #1c1c1c"}}>⟶ Horizontaal</button>
          <button className="btn sm" onClick={()=>setView("grid")} style={{background:view==="grid"?"#b8860b":"transparent",color:view==="grid"?"#000":"#555",border:"1px solid #1c1c1c"}}>⊞ Grid</button>
          <button className="btn bg" onClick={addCard}>+ Card Toevoegen</button>
        </div>
      </div>

      {cards.length===0&&(
        <div style={{textAlign:"center",padding:"60px 20px",color:"#2a2a2a"}}>
          <div style={{fontSize:40,marginBottom:10}}>🎨</div>
          <div className="mono" style={{fontSize:10,letterSpacing:2}}>NOG GEEN STORYBOARD CARDS</div>
          <div style={{fontSize:11,color:"#222",marginTop:6}}>Voeg je eerste card toe om te beginnen</div>
        </div>
      )}

      <div style={view==="horizontal"?{display:"flex",gap:16,overflowX:"auto",paddingBottom:16,alignItems:"flex-start"}:{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(280px,1fr))",gap:16}}>
        {cards.map((card,idx)=>(
          <SBCard key={card.id} card={card} idx={idx} total={cards.length} shots={shots}
            onEdit={()=>setEditing(card.id)} onDelete={()=>deleteCard(card.id)}
            onMove={dir=>moveCard(card.id,dir)} onDraw={()=>setDrawing(card.id)}
            horizontal={view==="horizontal"}/>
        ))}
      </div>

      {editing&&(
        <SBEditModal card={cards.find(c=>c.id===editing)} shots={shots}
          onSave={patch=>{updateCard(editing,patch);setEditing(null);}}
          onClose={()=>setEditing(null)}/>
      )}
      {drawing&&(
        <SBDrawModal card={cards.find(c=>c.id===drawing)}
          onSave={canvas=>{updateCard(drawing,{canvas});setDrawing(null);}}
          onClose={()=>setDrawing(null)}/>
      )}
    </div>
  );
}

// ── Storyboard Draw Modal ─────────────────────────────────────────────────────
function SBDrawModal({card,onSave,onClose}){
  const canvasRef=useRef();
  const [tool,setTool]=useState("pen"); // pen | eraser | text
  const [color,setColor]=useState("#e8e0d0");
  const [size,setSize]=useState(3);
  const [drawing,setDrawingState]=useState(false);
  const [history,setHistory]=useState([]);
  const [textInput,setTextInput]=useState("");
  const [textPos,setTextPos]=useState(null);

  useEffect(()=>{
    const canvas=canvasRef.current;
    if(!canvas)return;
    const ctx=canvas.getContext("2d");
    ctx.fillStyle="#0a0a0a";
    ctx.fillRect(0,0,canvas.width,canvas.height);
    if(card?.canvas){
      const img=new Image();
      img.onload=()=>ctx.drawImage(img,0,0);
      img.src=card.canvas;
    }
  },[]);

  const saveHistory=()=>{
    const canvas=canvasRef.current;
    setHistory(h=>[...h.slice(-19),canvas.toDataURL()]);
  };

  const undo=()=>{
    if(history.length===0)return;
    const canvas=canvasRef.current;
    const ctx=canvas.getContext("2d");
    const prev=history[history.length-1];
    setHistory(h=>h.slice(0,-1));
    const img=new Image();
    img.onload=()=>{ctx.clearRect(0,0,canvas.width,canvas.height);ctx.drawImage(img,0,0);};
    img.src=prev;
  };

  const getPos=e=>{
    const canvas=canvasRef.current;
    const rect=canvas.getBoundingClientRect();
    const scaleX=canvas.width/rect.width;
    const scaleY=canvas.height/rect.height;
    const clientX=e.touches?e.touches[0].clientX:e.clientX;
    const clientY=e.touches?e.touches[0].clientY:e.clientY;
    return{x:(clientX-rect.left)*scaleX,y:(clientY-rect.top)*scaleY};
  };

  const startDraw=e=>{
    if(tool==="text"){
      const pos=getPos(e);
      setTextPos(pos);
      return;
    }
    e.preventDefault();
    saveHistory();
    setDrawingState(true);
    const canvas=canvasRef.current;
    const ctx=canvas.getContext("2d");
    const pos=getPos(e);
    ctx.beginPath();
    ctx.moveTo(pos.x,pos.y);
  };

  const draw=e=>{
    if(!drawing||tool==="text")return;
    e.preventDefault();
    const canvas=canvasRef.current;
    const ctx=canvas.getContext("2d");
    const pos=getPos(e);
    ctx.lineWidth=tool==="eraser"?size*5:size;
    ctx.lineCap="round";
    ctx.lineJoin="round";
    ctx.strokeStyle=tool==="eraser"?"#0a0a0a":color;
    ctx.globalCompositeOperation=tool==="eraser"?"destination-out":"source-over";
    ctx.lineTo(pos.x,pos.y);
    ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(pos.x,pos.y);
  };

  const stopDraw=()=>{
    setDrawingState(false);
    const canvas=canvasRef.current;
    const ctx=canvas.getContext("2d");
    ctx.globalCompositeOperation="source-over";
  };

  const placeText=()=>{
    if(!textPos||!textInput)return;
    const canvas=canvasRef.current;
    const ctx=canvas.getContext("2d");
    saveHistory();
    ctx.font=`${size*6}px 'Crimson Pro', serif`;
    ctx.fillStyle=color;
    ctx.globalCompositeOperation="source-over";
    ctx.fillText(textInput,textPos.x,textPos.y);
    setTextInput("");setTextPos(null);
  };

  const clearCanvas=()=>{
    saveHistory();
    const canvas=canvasRef.current;
    const ctx=canvas.getContext("2d");
    ctx.fillStyle="#0a0a0a";
    ctx.fillRect(0,0,canvas.width,canvas.height);
  };

  const handleSave=()=>{
    const canvas=canvasRef.current;
    onSave(canvas.toDataURL("image/png"));
  };

  return(
    <div style={{position:"fixed",inset:0,background:"#000e",zIndex:300,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:12}}>
      <div style={{background:"#0d0d0d",border:"1px solid #2a2a2a",borderRadius:4,width:"100%",maxWidth:820,display:"flex",flexDirection:"column",maxHeight:"95vh"}}>
        {/* Toolbar */}
        <div style={{padding:"10px 14px",borderBottom:"1px solid #1a1a1a",display:"flex",alignItems:"center",gap:10,flexWrap:"wrap"}}>
          <span className="mono" style={{fontSize:9,color:"#b8860b",letterSpacing:2,marginRight:4}}>✏ TEKENEN</span>
          {/* Tools */}
          <div style={{display:"flex",gap:4}}>
            {[["pen","🖊 Pen"],["eraser","◻ Gum"],["text","T Tekst"]].map(([k,l])=>(
              <button key={k} className="btn sm" onClick={()=>setTool(k)} style={{background:tool===k?"#b8860b":"#1a1a1a",color:tool===k?"#000":"#888",border:"1px solid #222"}}>{l}</button>
            ))}
          </div>
          {/* Colors */}
          <div style={{display:"flex",gap:3,alignItems:"center"}}>
            {DRAW_COLORS.map(c=>(
              <button key={c} onClick={()=>{setColor(c);setTool("pen");}} style={{width:18,height:18,background:c,border:color===c?"2px solid #b8860b":"2px solid #333",borderRadius:"50%",cursor:"pointer",padding:0,transition:"transform .1s",transform:color===c?"scale(1.3)":"scale(1)"}}/>
            ))}
          </div>
          {/* Size */}
          <div style={{display:"flex",alignItems:"center",gap:5}}>
            <span className="mono" style={{fontSize:8,color:"#444"}}>DIKTE</span>
            <input type="range" min={1} max={12} value={size} onChange={e=>setSize(Number(e.target.value))} style={{width:70,accentColor:"#b8860b"}}/>
            <span className="mono" style={{fontSize:9,color:"#666"}}>{size}</span>
          </div>
          {/* Actions */}
          <div style={{display:"flex",gap:4,marginLeft:"auto"}}>
            <button className="btn gh sm" onClick={undo} title="Ongedaan maken (Ctrl+Z)">↩ Undo</button>
            <button className="btn rd sm" onClick={clearCanvas}>🗑 Leegmaken</button>
            <button className="btn gh sm" onClick={onClose}>Annuleren</button>
            <button className="btn bg sm" onClick={handleSave}>✓ Opslaan</button>
          </div>
        </div>

        {/* Text input bar (when text tool active) */}
        {tool==="text"&&(
          <div style={{padding:"8px 14px",borderBottom:"1px solid #1a1a1a",display:"flex",gap:8,alignItems:"center",background:"#0a0a0a"}}>
            <span className="mono" style={{fontSize:9,color:"#b8860b"}}>T</span>
            <input value={textInput} onChange={e=>setTextInput(e.target.value)} placeholder="Typ tekst, klik dan op het canvas…" style={{flex:1,background:"#141414",border:"1px solid #222",color:"#e8e0d0",padding:"5px 10px",borderRadius:2,fontSize:13,outline:"none",fontFamily:"inherit"}} onKeyDown={e=>e.key==="Enter"&&placeText()}/>
            {textPos&&<button className="btn bg sm" onClick={placeText}>Plaatsen ✓</button>}
            {textPos&&<span style={{fontSize:10,color:"#555"}} className="mono">Klik op canvas om positie te kiezen</span>}
          </div>
        )}

        {/* Canvas */}
        <div style={{flex:1,overflow:"auto",display:"flex",alignItems:"center",justifyContent:"center",padding:16,minHeight:300}}>
          <canvas ref={canvasRef} width={900} height={500}
            style={{width:"100%",maxWidth:900,border:"1px solid #2a2a2a",borderRadius:2,cursor:tool==="eraser"?"cell":tool==="text"?"crosshair":"crosshair",touchAction:"none",display:"block"}}
            onMouseDown={startDraw} onMouseMove={draw} onMouseUp={stopDraw} onMouseLeave={stopDraw}
            onTouchStart={startDraw} onTouchMove={draw} onTouchEnd={stopDraw}
          />
        </div>
        <div style={{padding:"6px 14px",borderTop:"1px solid #1a1a1a"}} className="mono">
          <span style={{fontSize:8,color:"#2a2a2a",letterSpacing:1}}>TIP: Werkt ook op touchscreen. Ctrl+Z = Undo.</span>
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
